<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tower of Hanoi Task</title>

<script src="https://unpkg.com/jspsych@7.3.3"></script>
<link href="https://unpkg.com/jspsych@7.3.3/css/jspsych.css" rel="stylesheet">

<script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
<script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>

<style>
.peg-container {
  display:flex;
  justify-content:space-around;
  margin-top:20px;
}

.peg {
  width:120px;
  height:220px;
  border:2px solid black;
  display:flex;
  flex-direction:column-reverse;
  align-items:center;
  padding:5px;
}

.disk {
  height:25px;
  margin:3px;
  text-align:center;
  color:white;
  border-radius:5px;
  cursor:pointer;
}
</style>

</head>

<body></body>

<script>

// =====================
// INIT
// =====================

const jsPsych = initJsPsych({
  on_finish: function(){
    jsPsych.data.get().localSave("csv","hanoi_data.csv");

    window.location.href =
      "https://docs.google.com/forms/d/e/1FAIpQLSe2xc_3B20WsNyfke8pMoPjkC4HukajEcNG3HWK6LL_wsBx3Q/viewform";
  }
});

let timeline = [];

// =====================
// ID
// =====================

timeline.push({
  type: jsPsychSurveyText,
  questions:[{prompt:"Participant ID:", name:"id"}]
});

// =====================
// INSTRUCTIONS
// =====================

timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <h2>Tower of Hanoi</h2>
    <p>Move all disks from A → C</p>
    <ul>
      <li>Only one disk at a time</li>
      <li>Only top disk can be moved</li>
      <li>No larger on smaller</li>
    </ul>
    <p>Click a peg to select source, then destination.</p>
  `,
  choices:["Start"]
});

// =====================
// REAL STATE ENGINE
// =====================

let pegs;
let selected = null;
let moves = [];

function render(){
  return `
  <div class="peg-container">

    <div class="peg" id="A"></div>
    <div class="peg" id="B"></div>
    <div class="peg" id="C"></div>

  </div>
  <p>Click source peg, then destination peg.</p>
  `;
}

function drawState(){
  ["A","B","C"].forEach(id=>{
    let peg = document.getElementById(id);
    peg.innerHTML = `<b>${id}</b>`;

    pegs[id].slice().reverse().forEach(d=>{
      let div = document.createElement("div");
      div.className="disk";
      div.style.width = (40 + d*30)+"px";
      div.style.background = ["green","orange","red","blue"][d-1];
      div.textContent = d;
      peg.appendChild(div);
    });
  });
}

function move(from,to){
  let fromPeg = pegs[from];
  let toPeg = pegs[to];

  if(fromPeg.length===0) return false;

  let disk = fromPeg[fromPeg.length-1];
  let top = toPeg[toPeg.length-1];

  if(top && disk > top) return false;

  fromPeg.pop();
  toPeg.push(disk);

  moves.push({from,to,disk});
  return true;
}

// =====================
// TASK TRIAL
// =====================

timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus: render,
  choices:[],
  on_load:function(){

    pegs = {
      A:[3,2,1],
      B:[],
      C:[]
    };

    drawState();

    let source = null;

    document.querySelectorAll(".peg").forEach(p=>{
      p.addEventListener("click", ()=>{

        let id = p.id;

        if(!source){
          source = id;
        } else {

          move(source,id);
          source = null;
          drawState();

          // CHECK WIN
          if(pegs.C.length===3){
            setTimeout(()=>jsPsych.finishTrial(),500);
          }

        }

      });
    });

  },

  on_finish:function(data){
    data.moves = JSON.stringify(moves);
  }
});

// =====================
// END
// =====================

timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus:`<h3>Task complete</h3>`,
  choices:["Continue"]
});

jsPsych.run(timeline);

</script>

</html>
