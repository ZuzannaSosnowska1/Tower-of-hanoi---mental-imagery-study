<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Tower of Hanoi Experiment</title>

<script src="https://unpkg.com/jspsych@7.3.3"></script>
<link href="https://unpkg.com/jspsych@7.3.3/css/jspsych.css" rel="stylesheet">

<script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>

<style>
#board {
  display:flex;
  justify-content:space-around;
  margin-top:40px;
}

.peg {
  width:120px;
  height:250px;
  border-left:4px solid black;
  border-right:4px solid black;
  position:relative;
  display:flex;
  flex-direction:column-reverse;
  align-items:center;
  padding-bottom:10px;
}

.disk {
  height:25px;
  margin:2px;
  border-radius:5px;
  color:white;
  text-align:center;
  cursor:pointer;
}

#info {
  text-align:center;
  margin-top:20px;
}
</style>

</head>

<body></body>

<script>

// =========================
// INIT
// =========================

const jsPsych = initJsPsych({
  on_finish: function(){

    jsPsych.data.get().localSave("csv","hanoi_data.csv");

    window.location.href =
      "https://docs.google.com/forms/d/e/1FAIpQLSe2xc_3B20WsNyfke8pMoPjkC4HukajEcNG3HWK6LL_wsBx3Q/viewform";
  }
});

let timeline = [];

// =========================
// ID
// =========================

timeline.push({
  type: jsPsychSurveyText,
  questions:[{prompt:"Participant ID:", name:"id"}]
});

// =========================
// INSTRUCTIONS
// =========================

timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <h2>Tower of Hanoi Task</h2>
    <p>Move all disks from left peg to right peg.</p>

    <ul>
      <li>Only move one disk at a time</li>
      <li>Only top disk can be moved</li>
      <li>No larger disk on smaller disk</li>
    </ul>

    <p>Time starts when you make your first move.</p>
  `,
  choices:["Start"]
});

// =========================
// REAL TASK
// =========================

timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <h3>Tower of Hanoi</h3>

    <div id="info">
      <p>Time: <span id="timer">0</span> sec</p>
      <p>Moves: <span id="moves">0</span></p>
    </div>

    <div id="board">

      <div class="peg" id="A">
        <div class="disk" data-size="3" style="width:120px;background:#e74c3c;">3</div>
        <div class="disk" data-size="2" style="width:90px;background:#f39c12;">2</div>
        <div class="disk" data-size="1" style="width:60px;background:#2ecc71;">1</div>
        <p>A</p>
      </div>

      <div class="peg" id="B"><p>B</p></div>
      <div class="peg" id="C"><p>C</p></div>

    </div>

    <button id="finish">Finish</button>
  `,

  choices: [],

  on_load: function(){

    let selected = null;
    let moves = 0;
    let startTime = null;
    let timerInterval;

    function getTop(peg){
      return peg.querySelector(".disk:last-of-type");
    }

    function updateTimer(){
      let now = Date.now();
      document.getElementById("timer").innerText =
        Math.floor((now - startTime)/1000);
    }

    function checkWin(){
      if(document.getElementById("C").querySelectorAll(".disk").length === 3){
        clearInterval(timerInterval);
        setTimeout(()=>jsPsych.finishTrial(),500);
      }
    }

    document.querySelectorAll(".disk").forEach(d=>{
      d.setAttribute("draggable", true);

      d.addEventListener("dragstart", e=>{
        selected = e.target;
      });
    });

    document.querySelectorAll(".peg").forEach(peg=>{
      peg.addEventListener("dragover", e=>{
        e.preventDefault();
      });

      peg.addEventListener("drop", e=>{
        e.preventDefault();

        if(!selected) return;

        let top = getTop(peg);

        let sSize = parseInt(selected.dataset.size);
        let tSize = top ? parseInt(top.dataset.size) : 999;

        // START TIMER ON FIRST MOVE
        if(startTime === null){
          startTime = Date.now();
          timerInterval = setInterval(updateTimer, 500);
        }

        // RULE CHECK
        if(sSize < tSize){
          peg.appendChild(selected);
          moves++;
          document.getElementById("moves").innerText = moves;
        }

        selected = null;

        checkWin();
      });
    });

    document.getElementById("finish").addEventListener("click", ()=>{
      jsPsych.finishTrial();
    });

  },

  on_finish: function(data){
    data.task = "tower_of_hanoi_real";
  }
});

// =========================
// END
// =========================

timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus:`<h3>Task complete</h3>`,
  choices:["Continue"]
});

jsPsych.run(timeline);

</script>

</html>
