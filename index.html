<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tower of Hanoi Study</title>

<script src="https://unpkg.com/jspsych@7.3.3"></script>
<link href="https://unpkg.com/jspsych@7.3.3/css/jspsych.css" rel="stylesheet">

<script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>
<script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>

<style>
body{
  font-family: Arial, sans-serif;
  text-align:center;
}

#board{
  display:flex;
  justify-content:space-around;
  align-items:flex-end;
  margin:30px auto;
  max-width:900px;
}

.peg{
  width:180px;
  height:320px;
  position:relative;
  border-bottom:4px solid black;
  cursor:pointer;
}

.rod{
  width:8px;
  height:250px;
  background:black;
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:0;
}

.peg-label{
  position:absolute;
  bottom:-28px;
  width:100%;
  font-weight:bold;
}

.disk{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  height:28px;
  line-height:28px;
  border-radius:6px;
  color:white;
  cursor:pointer;
  user-select:none;
  transition:all .25s ease;
  box-sizing:border-box;
}

.disk.selected{
  outline:4px solid black;
  box-shadow:0 0 12px rgba(0,0,0,.35);
}

#info{
  font-size:18px;
  margin-top:15px;
}

#message{
  height:24px;
  margin-top:10px;
  font-weight:bold;
  color:#b00020;
}

button{
  padding:10px 18px;
  font-size:16px;
}
</style>
</head>

<body></body>

<script>

// ===================================================
// CHANGE ONLY THIS LINK IF NEEDED
// ===================================================

const POST_TASK_FORM_LINK =
"https://docs.google.com/forms/d/e/1FAIpQLSe2xc_3B20WsNyfke8pMoPjkC4HukajEcNG3HWK6LL_wsBx3Q/viewform?usp=dialog";

// ===================================================
// INIT
// ===================================================

const jsPsych = initJsPsych({
  on_finish: function () {
    window.location.href = POST_TASK_FORM_LINK;
  }
});

let timeline = [];

// ===================================================
// PARTICIPANT ID
// ===================================================

timeline.push({
  type: jsPsychSurveyText,
  questions: [
    {
      prompt: "Enter Participant ID:",
      name: "participant_id",
      required: true
    }
  ]
});

// ===================================================
// INSTRUCTIONS
// ===================================================

timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <h2>Tower of Hanoi Task</h2>

    <p>Move all disks from Peg A to Peg C.</p>

    <p><b>Rules:</b></p>
    <ul style="display:inline-block;text-align:left;">
      <li>Move only one disk at a time</li>
      <li>Only the top disk can be moved</li>
      <li>A larger disk cannot be placed on a smaller disk</li>
    </ul>

    <p><b>How to play:</b></p>
    <p>
      1. Click the top disk you want to move<br>
      2. The disk will highlight<br>
      3. Click the destination peg
    </p>

    <p>Time starts on your first valid move.</p>
  `,
  choices:["Start"]
});

// ===================================================
// TASK
// ===================================================

timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <h3>Tower of Hanoi</h3>

    <div id="info">
      Time: <span id="timer">0</span> sec |
      Moves: <span id="moves">0</span>
    </div>

    <div id="message"></div>

    <div id="board">

      <div class="peg" id="A">
        <div class="rod"></div>
        <div class="peg-label">A</div>
      </div>

      <div class="peg" id="B">
        <div class="rod"></div>
        <div class="peg-label">B</div>
      </div>

      <div class="peg" id="C">
        <div class="rod"></div>
        <div class="peg-label">C</div>
      </div>

    </div>

    <br>
    <button id="finishBtn">Finish</button>
  `,
  choices: [],

  on_load: function(){

    // -----------------------------
    // GAME STATE
    // -----------------------------

    let pegs = {
      A:[3,2,1],
      B:[],
      C:[]
    };

    let selectedPeg = null;
    let moves = 0;

    let started = false;
    let startTime = null;
    let timerInterval = null;

    // -----------------------------
    // HELPERS
    // -----------------------------

    function showMessage(text){
      document.getElementById("message").innerText = text;
    }

    function clearMessage(){
      showMessage("");
    }

    function diskColor(size){
      if(size===1) return "#2ecc71";
      if(size===2) return "#f39c12";
      return "#e74c3c";
    }

    function topDisk(pegName){
      let stack = pegs[pegName];
      if(stack.length===0) return null;
      return stack[stack.length-1];
    }

    function startTimer(){
      if(started) return;

      started = true;
      startTime = Date.now();

      timerInterval = setInterval(function(){
        let sec = Math.floor((Date.now()-startTime)/1000);
        document.getElementById("timer").innerText = sec;
      },250);
    }

    function stopTimer(){
      if(timerInterval){
        clearInterval(timerInterval);
      }
    }

    function currentSeconds(){
      if(!started) return 0;
      return Math.floor((Date.now()-startTime)/1000);
    }

    function clearSelection(){
      selectedPeg = null;
      document.querySelectorAll(".disk").forEach(d=>{
        d.classList.remove("selected");
      });
    }

    // -----------------------------
    // DRAW BOARD
    // -----------------------------

    function render(){

      ["A","B","C"].forEach(function(name){

        const peg = document.getElementById(name);

        peg.querySelectorAll(".disk").forEach(el=>el.remove());

        const stack = pegs[name];

        for(let i=0;i<stack.length;i++){

          const size = stack[i];

          const disk = document.createElement("div");
          disk.className = "disk";
          disk.dataset.size = size;
          disk.dataset.peg = name;

          disk.style.width = (55 + size*38) + "px";
          disk.style.bottom = (i*32 + 4) + "px";
          disk.style.background = diskColor(size);

          disk.innerText = size;

          // only top disk clickable
          if(i === stack.length-1){

            disk.addEventListener("click", function(e){
              e.stopPropagation();

              clearSelection();

              selectedPeg = name;
              disk.classList.add("selected");

              showMessage("Selected disk from peg " + name);
            });
          }

          peg.appendChild(disk);
        }

        // peg click = move selected disk
        peg.onclick = function(){

          if(selectedPeg === null) return;

          // click same peg = cancel selection
          if(selectedPeg === name){
            clearSelection();
            clearMessage();
            return;
          }

          const moving = topDisk(selectedPeg);
          const target = topDisk(name);

          // illegal move
          if(target !== null && moving > target){
            showMessage("Illegal move.");
            return;
          }

          startTimer();

          pegs[selectedPeg].pop();
          pegs[name].push(moving);

          moves++;
          document.getElementById("moves").innerText = moves;

          clearSelection();
          clearMessage();

          render();
          checkSolved();
        };

      });

    }

    // -----------------------------
    // SOLVED
    // -----------------------------

    function checkSolved(){

      if(pegs.C.length === 3){

        stopTimer();

        jsPsych.finishTrial({
          participant_id:
            jsPsych.data.get().filter({trial_type:"survey-text"}).values()[0]
            ?.response?.participant_id || "",

          moves:moves,
          completion_time_sec:currentSeconds(),
          solved:true
        });
      }
    }

    // -----------------------------
    // FINISH BUTTON
    // -----------------------------

    document.getElementById("finishBtn").addEventListener("click", function(){

      stopTimer();

      jsPsych.finishTrial({
        participant_id:
          jsPsych.data.get().filter({trial_type:"survey-text"}).values()[0]
          ?.response?.participant_id || "",

        moves:moves,
        completion_time_sec:currentSeconds(),
        solved:false
      });

    });

    render();

  }
});

// ===================================================
// END SCREEN
// ===================================================

timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <h3>Task Complete</h3>
    <p>You will now continue to the next questionnaire.</p>
  `,
  choices:["Continue"]
});

// ===================================================
// RUN
// ===================================================

jsPsych.run(timeline);

</script>
</html>
