<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Imagery & Problem Solving Study</title>

<script src="https://unpkg.com/jspsych@7.3.3"></script>
<link href="https://unpkg.com/jspsych@7.3.3/css/jspsych.css" rel="stylesheet">

<script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
<script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>

</head>

<body></body>

<script>

// =====================
// INITIALIZE EXPERIMENT
// =====================

const jsPsych = initJsPsych({
  on_finish: function() {
    jsPsych.data.get().localSave('csv', 'tower_hanoi_data.csv');

    // REDIRECT TO GOOGLE FORM 2
    window.location.href = "https://docs.google.com/forms/d/e/1FAIpQLSe2xc_3B20WsNyfke8pMoPjkC4HukajEcNG3HWK6LL_wsBx3Q/viewform?usp=dialog";
  }
});

let timeline = [];

// =====================
// PARTICIPANT ID
// =====================

timeline.push({
  type: jsPsychSurveyText,
  questions: [
    {
      prompt: "Enter your participant ID:",
      name: "participant_id"
    }
  ]
});

// =====================
// INSTRUCTIONS
// =====================

timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <h2>Tower of Hanoi Task</h2>
    <p>In this task, you will solve a problem-solving puzzle.</p>

    <p><b>Rules:</b></p>
    <ul>
      <li>Only one disk can be moved at a time</li>
      <li>Larger disk cannot be placed on a smaller disk</li>
      <li>The goal is to move all disks to the target peg</li>
    </ul>

    <p>Try to choose the best logical move each time.</p>
  `,
  choices: ["Start"]
});

// =====================
// TRIAL 1
// =====================

timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <h3>Trial 1</h3>
    <p>All disks are on Peg A.</p>
    <p>What is the best first move?</p>
  `,
  choices: [
    "Move small disk A → B",
    "Move small disk A → C",
    "Move large disk A → B"
  ],
  data: {
    correct: 1
  },
  on_finish: function(data){
    data.correct_response = (data.response == data.correct);
  }
});

// =====================
// TRIAL 2
// =====================

timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <h3>Trial 2</h3>
    <p>Next step in the puzzle.</p>
    <p>What should you do next?</p>
  `,
  choices: [
    "Move disk B → C",
    "Move disk A → C",
    "Move disk C → B"
  ],
  data: {
    correct: 0
  },
  on_finish: function(data){
    data.correct_response = (data.response == data.correct);
  }
});

// =====================
// TRIAL 3
// =====================

timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <h3>Trial 3</h3>
    <p>Another step in the problem.</p>
    <p>Choose the best move:</p>
  `,
  choices: [
    "Move small disk A → B",
    "Move middle disk A → C",
    "Move large disk A → C"
  ],
  data: {
    correct: 0
  },
  on_finish: function(data){
    data.correct_response = (data.response == data.correct);
  }
});

// =====================
// END SCREEN
// =====================

timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <h2>Task Complete</h2>
    <p>Thank you for participating.</p>
    <p>Click continue to finish.</p>
  `,
  choices: ["Finish"]
});

// =====================
// RUN EXPERIMENT
// =====================

jsPsych.run(timeline);

</script>

</html>
