<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Tower of Hanoi Study</title>

<script src="https://unpkg.com/jspsych@7.3.3"></script>
<link href="https://unpkg.com/jspsych@7.3.3/css/jspsych.css" rel="stylesheet">

<script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>
<script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>

<style>
.peg-container {
  display: flex;
  justify-content: space-around;
  margin-top: 20px;
}

.peg {
  width: 120px;
  height: 220px;
  border: 2px solid black;
  display: flex;
  flex-direction: column-reverse;
  align-items: center;
  padding: 5px;
}

.disk {
  height: 25px;
  margin: 3px;
  border-radius: 5px;
  text-align: center;
  color: white;
  cursor: grab;
}
</style>

</head>

<body></body>

<script>

// =====================
// INIT
// =====================

const jsPsych = initJsPsych({
  on_finish: function() {
    jsPsych.data.get().localSave('csv', 'tower_hanoi_data.csv');

    window.location.href = "https://docs.google.com/forms/d/e/1FAIpQLSe2xc_3B20WsNyfke8pMoPjkC4HukajEcNG3HWK6LL_wsBx3Q/viewform?usp=dialog";
  }
});

let timeline = [];

// =====================
// PARTICIPANT ID
// =====================

timeline.push({
  type: jsPsychSurveyText,
  questions: [
    { prompt: "Enter participant ID:", name: "id" }
  ]
});

// =====================
// INSTRUCTIONS
// =====================

timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <h2>Tower of Hanoi</h2>
    <p>Move all disks from Peg A to Peg C.</p>
    <p><b>Rules:</b></p>
    <ul>
      <li>Only one disk at a time</li>
      <li>No larger disk on smaller disk</li>
    </ul>
  `,
  choices: ["Start"]
});

// =====================
// REAL TASK
// =====================

timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <h3>Interactive Task</h3>

    <div class="peg-container">

      <div class="peg" id="A">
        <div class="disk" data-size="3" style="width:120px; background:red;">3</div>
        <div class="disk" data-size="2" style="width:90px; background:orange;">2</div>
        <div class="disk" data-size="1" style="width:60px; background:green;">1</div>
        <p>Peg A</p>
      </div>

      <div class="peg" id="B">
        <p>Peg B</p>
      </div>

      <div class="peg" id="C">
        <p>Peg C</p>
      </div>

    </div>

    <br>
    <button id="finish">Finish Task</button>
  `,

  choices: [],

  on_load: function() {

    let dragged = null;

    function getTopDisk(peg) {
      let disks = peg.querySelectorAll(".disk");
      return disks[disks.length - 1];
    }

    document.querySelectorAll(".disk").forEach(disk => {
      disk.addEventListener("dragstart", e => {
        dragged = e.target;
      });
    });

    document.querySelectorAll(".disk").forEach(disk => {
      disk.setAttribute("draggable", true);
    });

    document.querySelectorAll(".peg").forEach(peg => {

      peg.addEventListener("dragover", e => {
        e.preventDefault();
      });

      peg.addEventListener("drop", e => {
        e.preventDefault();

        if (!dragged) return;

        let top = getTopDisk(peg);

        let draggedSize = parseInt(dragged.dataset.size);
        let topSize = top ? parseInt(top.dataset.size) : 999;

        // RULE CHECK (core logic)
        if (draggedSize < topSize) {
          peg.appendChild(dragged);
        }

        dragged = null;
      });
    });

    document.getElementById("finish").addEventListener("click", function() {
      jsPsych.finishTrial();
    });

  },

  on_finish: function(data) {
    data.task = "tower_of_hanoi_real";
  }
});

// =====================
// END SCREEN
// =====================

timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus: `<h3>Task complete</h3>`,
  choices: ["Continue"]
});

// =====================
// RUN
// =====================

jsPsych.run(timeline);

</script>

</html>
