<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tower of Hanoi Study</title>

<script src="https://unpkg.com/jspsych@7.3.3"></script>
<link href="https://unpkg.com/jspsych@7.3.3/css/jspsych.css" rel="stylesheet">

<script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>
<script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>

<style>
body{
  font-family: Arial;
  text-align:center;
}

#board{
  display:flex;
  justify-content:space-around;
  align-items:flex-end;
  margin-top:30px;
}

.peg{
  width:180px;
  height:320px;
  position:relative;
  border-bottom:4px solid black;
  cursor:pointer;
}

.rod{
  width:8px;
  height:250px;
  background:black;
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:0;
}

.peg-label{
  position:absolute;
  bottom:-30px;
  width:100%;
  font-weight:bold;
}

.disk{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  height:28px;
  line-height:28px;
  border-radius:6px;
  color:white;
  cursor:pointer;
  user-select:none;
}

.disk.selected{
  outline:4px solid black;
  box-shadow:0 0 10px rgba(0,0,0,0.4);
}

#info{
  margin-top:15px;
  font-size:18px;
}

#message{
  height:25px;
  color:red;
}
</style>
</head>

<body></body>

<script>

// ==========================
// GOOGLE FORM 2 LINK
// ==========================

const GOOGLE_FORM_BASE =
"https://docs.google.com/forms/d/e/1FAIpQLSe2xc_3B20WsNyfke8pMoPjkC4HukajEcNG3HWK6LL_wsBx3Q/viewform?usp=pp_url";

// ==========================
// GLOBAL VARIABLES
// ==========================

let participant_id = "";
let task_data = {moves:0, time:0, solved:false};

// ==========================
// INIT
// ==========================

const jsPsych = initJsPsych({
  on_finish: function(data){

    let url =
      GOOGLE_FORM_BASE +
      "&entry.146328682=" + encodeURIComponent(participant_id) +
      "&entry.558532723=" + encodeURIComponent(task_data.moves) +
      "&entry.1869517534=" + encodeURIComponent(task_data.time) +
      "&entry.1053943810=" + encodeURIComponent(task_data.solved);

    window.location.href = url;
  }
});

let timeline = [];

// ==========================
// PARTICIPANT ID
// ==========================

timeline.push({
  type: jsPsychSurveyText,
  questions:[{
    prompt:"Participant ID:",
    name:"participant_id"
  }],
  on_finish: function(data){
    participant_id = data.response.participant_id;
  }
});

// ==========================
// INSTRUCTIONS
// ==========================

timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <h2>Tower of Hanoi</h2>
    <p>Move all disks from A to C.</p>

    <ul>
      <li>Only one disk at a time</li>
      <li>Only top disk can move</li>
      <li>No larger disk on smaller disk</li>
    </ul>
  `,
  choices:["Start"]
});

// ==========================
// TASK
// ==========================

timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <div id="info">
      Moves: <span id="moves">0</span> |
      Time: <span id="time">0</span>
    </div>

    <div id="message"></div>

    <div id="board">
      <div class="peg" id="A"><div class="rod"></div><div class="peg-label">A</div></div>
      <div class="peg" id="B"><div class="rod"></div><div class="peg-label">B</div></div>
      <div class="peg" id="C"><div class="rod"></div><div class="peg-label">C</div></div>
    </div>

    <button id="finish">Finish</button>
  `,

  choices: [],

  on_load: function(){

    let pegs = {A:[3,2,1], B:[], C:[]};
    let selected = null;
    let moves = 0;
    let start = null;
    let interval;

    function updateTime(){
      document.getElementById("time").innerText =
        Math.floor((Date.now()-start)/1000);
    }

    function render(){

      ["A","B","C"].forEach(p=>{

        let peg = document.getElementById(p);
        peg.querySelectorAll(".disk").forEach(d=>d.remove());

        pegs[p].forEach((size,i)=>{

          let d = document.createElement("div");
          d.className="disk";
          d.dataset.size=size;

          d.style.width=(50+size*35)+"px";
          d.style.bottom=(i*32)+"px";
          d.style.background = size==1?"#2ecc71":size==2?"#f39c12":"#e74c3c";
          d.innerText=size;

          if(i===pegs[p].length-1){
            d.onclick = function(e){
              e.stopPropagation();
              document.querySelectorAll(".disk").forEach(x=>x.classList.remove("selected"));
              selected = {peg:p,size:size};
              d.classList.add("selected");
            };
          }

          peg.appendChild(d);
        });

        peg.onclick = function(){

          if(!selected) return;

          let top = pegs[p][pegs[p].length-1];

          if(top && selected.size > top){
            document.getElementById("message").innerText = "Illegal move";
            return;
          }

          if(!start){
            start = Date.now();
            interval = setInterval(updateTime,500);
          }

          pegs[selected.peg].pop();
          pegs[p].push(selected.size);

          moves++;
          document.getElementById("moves").innerText = moves;

          selected = null;
          document.getElementById("message").innerText = "";

          render();
          checkWin();
        };
      });
    }

    function finishTask(solved){

      clearInterval(interval);

      task_data.moves = moves;
      task_data.time = Math.floor((Date.now()-start)/1000);
      task_data.solved = solved;

      jsPsych.finishTrial(task_data);
    }

    function checkWin(){
      if(pegs.C.length === 3){
        finishTask(true);
      }
    }

    render();

    document.getElementById("finish").onclick = function(){
      finishTask(false);
    };
  }
});

// ==========================
// END SCREEN
// ==========================

timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus:`<h2>Twoja odpowiedź została zapisana</h2>`,
  choices:["Continue"]
});

jsPsych.run(timeline);

</script>
</html>
