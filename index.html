<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Tower of Hanoi Experiment</title>

<script src="https://unpkg.com/jspsych@7.3.3"></script>
<link href="https://unpkg.com/jspsych@7.3.3/css/jspsych.css" rel="stylesheet">

<script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>
<script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>

<style>
body{
  font-family: Arial, sans-serif;
}

#board{
  display:flex;
  justify-content:space-around;
  align-items:flex-end;
  margin-top:30px;
}

.peg{
  width:180px;
  height:300px;
  position:relative;
  border-bottom:4px solid black;
  cursor:pointer;
}

.rod{
  width:8px;
  height:240px;
  background:black;
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:0;
}

.peg-label{
  position:absolute;
  bottom:-28px;
  width:100%;
  text-align:center;
  font-weight:bold;
}

.disk{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  height:28px;
  border-radius:6px;
  color:white;
  text-align:center;
  line-height:28px;
  cursor:pointer;
  user-select:none;
  transition: all 0.25s ease;
  box-sizing:border-box;
}

.disk.selected{
  outline:4px solid #111;
  box-shadow:0 0 12px rgba(0,0,0,.35);
}

#info{
  text-align:center;
  margin-top:20px;
  font-size:18px;
}

#message{
  text-align:center;
  margin-top:15px;
  font-weight:bold;
  min-height:24px;
}
</style>

</head>

<body></body>

<script>

// =========================
// INIT
// =========================

const jsPsych = initJsPsych({
  on_finish: function(){

    jsPsych.data.get().localSave("csv","hanoi_data.csv");

    window.location.href =
      "https://docs.google.com/forms/d/e/1FAIpQLSe2xc_3B20WsNyfke8pMoPjkC4HukajEcNG3HWK6LL_wsBx3Q/viewform?usp=dialog";
  }
});

let timeline = [];

// =========================
// ID
// =========================

timeline.push({
  type: jsPsychSurveyText,
  questions:[{prompt:"Participant ID:", name:"id"}]
});

// =========================
// INSTRUCTIONS
// =========================

timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <h2>Tower of Hanoi Task</h2>
    <p>Move all disks from peg A to peg C.</p>
    <ul>
      <li>Only one disk at a time</li>
      <li>Only top disk can be moved</li>
      <li>No larger disk on a smaller disk</li>
    </ul>
    <p><b>How to play:</b></p>
    <p>1. Click the top disk you want to move.<br>
       2. It will highlight.<br>
       3. Click the peg where you want to place it.</p>
    <p>Time starts on your first valid move.</p>
  `,
  choices:["Start"]
});

// =========================
// TASK
// =========================

timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <h3 style="text-align:center;">Tower of Hanoi</h3>

    <div id="info">
      Time: <span id="timer">0</span> sec |
      Moves: <span id="moves">0</span>
    </div>

    <div id="message"></div>

    <div id="board">

      <div class="peg" id="A">
        <div class="rod"></div>
        <div class="peg-label">A</div>
      </div>

      <div class="peg" id="B">
        <div class="rod"></div>
        <div class="peg-label">B</div>
      </div>

      <div class="peg" id="C">
        <div class="rod"></div>
        <div class="peg-label">C</div>
      </div>

    </div>

    <br><br>
    <div style="text-align:center;">
      <button id="finish">Finish</button>
    </div>
  `,
  choices: [],

  on_load: function(){

    let pegs = {
      A:[3,2,1],
      B:[],
      C:[]
    };

    let selectedPeg = null;
    let selectedDisk = null;

    let moves = 0;
    let startTime = null;
    let timerInterval = null;

    function msg(text){
      document.getElementById("message").innerText = text;
    }

    function startTimer(){
      if(startTime === null){
        startTime = Date.now();

        timerInterval = setInterval(()=>{
          const sec = Math.floor((Date.now() - startTime)/1000);
          document.getElementById("timer").innerText = sec;
        }, 250);
      }
    }

    function getTopDiskSize(pegName){
      if(pegs[pegName].length === 0) return null;
      return pegs[pegName][pegs[pegName].length - 1];
    }

    function clearSelection(){
      selectedPeg = null;
      selectedDisk = null;

      document.querySelectorAll(".disk").forEach(d=>{
        d.classList.remove("selected");
      });
    }

    function diskColor(size){
      if(size===1) return "#2ecc71";
      if(size===2) return "#f39c12";
      return "#e74c3c";
    }

    function render(){

      ["A","B","C"].forEach(name=>{

        const peg = document.getElementById(name);

        peg.querySelectorAll(".disk").forEach(el=>el.remove());

        const stack = pegs[name];

        for(let i=0;i<stack.length;i++){

          const size = stack[i];

          const disk = document.createElement("div");
          disk.className = "disk";
          disk.dataset.peg = name;
          disk.dataset.size = size;

          disk.style.width = (50 + size*35) + "px";
          disk.style.background = diskColor(size);
          disk.style.bottom = (i*32 + 4) + "px";

          disk.innerText = size;

          if(i === stack.length - 1){
            disk.addEventListener("click", function(e){
              e.stopPropagation();

              clearSelection();

              selectedPeg = name;
              selectedDisk = size;

              disk.classList.add("selected");
              msg("Selected disk " + size + " from peg " + name);
            });
          }

          peg.appendChild(disk);
        }

        peg.onclick = function(){

          if(selectedPeg === null) return;

          if(selectedPeg === name){
            clearSelection();
            msg("");
            return;
          }

          const movingDisk = pegs[selectedPeg][pegs[selectedPeg].length - 1];
          const targetTop = getTopDiskSize(name);

          if(targetTop !== null && movingDisk > targetTop){
            msg("Illegal move: larger disk cannot go on smaller disk.");
            return;
          }

          startTimer();

          pegs[selectedPeg].pop();
          pegs[name].push(movingDisk);

          moves++;
          document.getElementById("moves").innerText = moves;

          clearSelection();
          render();
          msg("");

          checkWin();
        };

      });
    }

    function checkWin(){

      if(pegs.C.length === 3){

        if(timerInterval) clearInterval(timerInterval);

        setTimeout(()=>{
          jsPsych.finishTrial({
            completion_time_sec: parseInt(document.getElementById("timer").innerText),
            moves: moves,
            solved: true
          });
        }, 500);
      }
    }

    render();

    document.getElementById("finish").addEventListener("click", ()=>{
      if(timerInterval) clearInterval(timerInterval);

      jsPsych.finishTrial({
        completion_time_sec: parseInt(document.getElementById("timer").innerText),
        moves: moves,
        solved: false
      });
    });

  }
});

// =========================
// END
// =========================

timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <h3>Task complete</h3>
    <p>Thank you for participating.</p>
  `,
  choices:["Continue"]
});

// =========================
// RUN
// =========================

jsPsych.run(timeline);

</script>

</html>
